<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>RTL Focusgroup</title>
    <script src="/dist/index.global.js"></script>
  </head>
  <body>
    <button id="before">Before</button>

    <div id="toolbar-rtl" focusgroup="toolbar" aria-label="RTL Toolbar">
      <button id="rtl-a">A</button>
      <button id="rtl-b">B</button>
      <button id="rtl-c">C</button>
    </div>

    <button id="after">After</button>
  </body>
</html>
