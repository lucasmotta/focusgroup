<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Tablist Focusgroup</title>
    <script src="/dist/index.global.js"></script>
  </head>
  <body>
    <button id="before">Before</button>

    <div id="tablist" focusgroup="tablist" aria-label="Tabs">
      <button id="tab-1" aria-controls="panel-1">Tab 1</button>
      <button id="tab-2" aria-controls="panel-2">Tab 2</button>
      <button id="tab-3" aria-controls="panel-3">Tab 3</button>
    </div>

    <div id="panel-1" role="tabpanel" tabindex="0">Panel 1</div>
    <div id="panel-2" role="tabpanel" tabindex="0" hidden>Panel 2</div>
    <div id="panel-3" role="tabpanel" tabindex="0" hidden>Panel 3</div>

    <button id="after">After</button>
  </body>
</html>
