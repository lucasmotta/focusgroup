<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Menu Focusgroup</title>
    <script src="/dist/index.global.js"></script>
  </head>
  <body>
    <button id="before">Before</button>

    <div id="menu" focusgroup="menu" aria-label="Actions">
      <button id="item-cut">Cut</button>
      <button id="item-copy">Copy</button>
      <button id="item-paste">Paste</button>
    </div>

    <button id="after">After</button>
  </body>
</html>
